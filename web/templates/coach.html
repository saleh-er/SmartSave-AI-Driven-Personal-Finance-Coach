<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSave — Coach IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080E1A;color:#F1F5F9;font-family:Inter,-apple-system,sans-serif;display:flex;justify-content:center;height:100vh;overflow:hidden}
.app{width:100%;max-width:430px;display:flex;flex-direction:column;height:100vh;padding-bottom:80px}
.coach-header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:#080E1A;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.coach-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#10B981);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#10B981;border-radius:50%;border:2px solid #080E1A}
.coach-info{flex:1}
.coach-name{font-size:0.95rem;font-weight:800}
.coach-status{font-size:0.7rem;color:#10B981;margin-top:1px;display:flex;align-items:center;gap:4px}
.chat-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.chat-wrap::-webkit-scrollbar{width:0}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;flex-shrink:0}
.msg-avatar.ai{background:linear-gradient(135deg,#6366F1,#10B981)}
.msg-avatar.user{background:linear-gradient(135deg,#F59E0B,#EF4444)}
.msg{max-width:75%;padding:11px 15px;border-radius:18px;font-size:0.88rem;line-height:1.55;animation:fadeUp 0.25s ease}
.msg p{margin:0}
.msg.user{background:linear-gradient(135deg,#6366F1,#4F46E5);color:white;border-bottom-right-radius:4px}
.msg.ai{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-bottom-left-radius:4px}
.msg-time{font-size:0.6rem;opacity:0.5;margin-top:5px;display:block}
.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#64748b;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}

.chip{white-space:nowrap;padding:8px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#94a3b8;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.chip:hover{border-color:#6366F1;color:#6366F1;background:rgba(99,102,241,0.08)}
.input-area{padding:10px 16px 16px;background:#080E1A;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.input-wrap{background:#0F172A;border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:6px 6px 6px 16px;display:flex;align-items:center;gap:8px}
.input-wrap input{background:none;border:none;color:#F1F5F9;flex:1;outline:none;font-size:0.9rem;padding:8px 0;font-family:Inter,-apple-system,sans-serif}
.input-wrap input::placeholder{color:#475569}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#10B981);border:none;color:white;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s}
.send-btn:active{transform:scale(0.92)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,14,26,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;padding:8px 16px 20px;z-index:200}
.nav-link{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:#64748b;padding:8px 4px;border-radius:12px;font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.nav-link i{font-size:1.1rem}.nav-link.active{color:#6366F1}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    </style>
</head>
<body>
<div class="app">
    <header class="coach-header">
        <div class="coach-avatar">
            ✨
            <div class="online-dot"></div>
        </div>
        <div class="coach-info">
            <div class="coach-name">SmartSave Coach</div>
            <div class="coach-status">
                <span style="width:6px;height:6px;background:#10B981;border-radius:50%;display:inline-block;"></span>
                En ligne — prêt à vous aider
            </div>
        </div>
        <a href="/" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.07);color:#F1F5F9;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:0.85rem;">
            <i class="fas fa-arrow-left"></i>
        </a>
    </header>

    <div class="chat-wrap" id="chatWindow">
        <div id="quick-chips" style="display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:8px 0;">
            <div class="chip" onclick="useChip(this, 'Analyse mes depenses de ce mois')">📊 Mes dépenses</div>
            <div class="chip" onclick="useChip(this, 'Comment sortir du decouvert ?')">🚨 Découvert</div>
            <div class="chip" onclick="useChip(this, 'Conseils pour economiser')">💡 Épargner</div>
        </div>
    </div>



    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="chatInput" placeholder="Posez une question...">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-link"><i class="fas fa-home"></i>Home</a>
    <a href="/transactions" class="nav-link"><i class="fas fa-receipt"></i>Dépenses</a>
    <a href="/analytics" class="nav-link"><i class="fas fa-chart-line"></i>Stats</a>
    <a href="/coach" class="nav-link active"><i class="fas fa-wand-magic-sparkles"></i>Coach</a>
    <a href="/goals" class="nav-link"><i class="fas fa-bullseye"></i>Objectifs</a>
</nav>

<script>
const chatWindow = document.getElementById("chatWindow");
const chatInput = document.getElementById("chatInput");
const USER_INITIAL = "{{ name[0]|upper if name else 'U' }}";

function useChip(el, text) {
    document.getElementById("quick-chips").style.display = "none";
    send(text);
}

function scrollBottom() {
    chatWindow.scrollTo({top: chatWindow.scrollHeight, behavior: "smooth"});
}

function timeNow() {
    const n = new Date();
    return n.getHours() + ":" + n.getMinutes().toString().padStart(2, "0");
}

function parseMarkdown(text) {
    return text
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/\n/g, "<br>");
}

function addMsg(text, isUser) {
    const row = document.createElement("div");
    row.className = "msg-row" + (isUser ? " user" : "");

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar " + (isUser ? "user" : "ai");
    avatar.textContent = isUser ? USER_INITIAL : "✨";

    const bubble = document.createElement("div");
    bubble.className = "msg " + (isUser ? "user" : "ai");
    bubble.innerHTML = "<p>" + parseMarkdown(text) + "</p><span class='msg-time'>" + timeNow() + "</span>";

    if (isUser) {
        row.appendChild(bubble);
        row.appendChild(avatar);
    } else {
        row.appendChild(avatar);
        row.appendChild(bubble);
    }

    chatWindow.appendChild(row);
    scrollBottom();
}

function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar ai";
    avatar.textContent = "✨";

    const dots = document.createElement("div");
    dots.className = "typing";
    dots.innerHTML = "<div class='dot'></div><div class='dot'></div><div class='dot'></div>";

    row.appendChild(avatar);
    row.appendChild(dots);
    chatWindow.appendChild(row);
    scrollBottom();
}

function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function send(text) {
    if (!text.trim()) return;
    addMsg(text, true);
    chatInput.value = "";
    showTyping();
    try {
        const r = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });
        const d = await r.json();
        hideTyping();
        addMsg(d.response, false);
    } catch(e) {
        hideTyping();
        addMsg("Erreur de connexion. Reessayez.", false);
    }
}

function sendMessage() {
    const text = chatInput.value.trim();
    if (text) send(text);
}

chatInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
